<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>পড়া শিখি 🌟</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Theme & Status bar -->
  <meta name="theme-color" content="#e64d00" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="পড়া শিখি" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Splash screen color for iOS -->
  <meta name="msapplication-TileColor" content="#e64d00" />
  <meta name="msapplication-TileImage" content="/icon-192.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@400;600;800&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- ══════════════ HOME PAGE ══════════════ -->
<div id="page-home" class="page active">
  <header class="home-header">
    <div class="title-emoji">🌈</div>
    <h1 class="main-title">পড়া শিখি</h1>
    <p class="subtitle">চলো অক্ষর চিনি!</p>
  </header>

  <div class="home-buttons">
    <button class="home-btn btn-abcd"    onclick="showPage('page-abcd')">
      <span class="btn-icon">🔤</span><span class="btn-label">ABCD শিখি</span>
    </button>
    <button class="home-btn btn-bangla"  onclick="showPage('page-bangla')">
      <span class="btn-icon">অ</span><span class="btn-label">বাংলা অক্ষর</span>
    </button>
    <button class="home-btn btn-english" onclick="showPage('page-english')">
      <span class="btn-icon">📖</span><span class="btn-label">ইংরেজি শিখি</span>
    </button>
    <button class="home-btn btn-practice" onclick="showPage('page-practice')">
      <span class="btn-icon">✏️</span><span class="btn-label">অনুশীলন</span>
    </button>
  </div>

  <!-- PWA Install banner (shown automatically when browser triggers event) -->
  <div id="pwa-install-bar" class="pwa-bar hidden">
    <span>📲 হোম স্ক্রিনে ইনস্টল করো!</span>
    <button class="pwa-install-btn" onclick="installPWA()">ইনস্টল করো</button>
  </div>

  <div class="stars-row">
    <span>⭐</span><span>🌟</span><span>⭐</span><span>🌟</span><span>⭐</span>
  </div>
</div>


<!-- ══════════════ ABCD PAGE ══════════════ -->
<div id="page-abcd" class="page">
  <div class="page-header yellow-header">
    <button class="back-btn" onclick="showPage('page-home')">⬅ ফিরে যাও</button>
    <h2>🔤 ABCD শিখি</h2>
  </div>
  <div class="cards-grid" id="abcd-grid"></div>
</div>


<!-- ══════════════ BANGLA PAGE ══════════════ -->
<div id="page-bangla" class="page">
  <div class="page-header green-header">
    <button class="back-btn" onclick="showPage('page-home')">⬅ ফিরে যাও</button>
    <h2>অ বাংলা অক্ষর</h2>
  </div>
  <div class="cards-grid" id="bangla-grid"></div>
</div>


<!-- ══════════════ ENGLISH PAGE ══════════════ -->
<div id="page-english" class="page">
  <div class="page-header english-header">
    <button class="back-btn" onclick="showPage('page-home')">⬅ ফিরে যাও</button>
    <h2>📖 ইংরেজি শিখি</h2>
  </div>

  <div class="eng-tabs">
    <button class="eng-tab active"  onclick="showEngTab('tab-letters')">অক্ষর</button>
    <button class="eng-tab"         onclick="showEngTab('tab-digraphs')">যুক্তবর্ণ</button>
    <button class="eng-tab"         onclick="showEngTab('tab-rules')">পড়ার নিয়ম</button>
  </div>

  <div id="tab-letters"  class="eng-tab-content active">
    <div id="eng-letters-grid"  class="eng-letter-list"></div>
  </div>
  <div id="tab-digraphs" class="eng-tab-content">
    <div id="eng-digraphs-grid" class="eng-letter-list"></div>
  </div>
  <div id="tab-rules"    class="eng-tab-content">
    <div id="eng-rules-list"    class="eng-rules-list"></div>
  </div>
</div>


<!-- ══════════════ PRACTICE PAGE ══════════════ -->
<div id="page-practice" class="page">
  <div class="page-header pink-header">
    <button class="back-btn" onclick="showPage('page-home')">⬅ ফিরে যাও</button>
    <h2>✏️ অনুশীলন</h2>
  </div>

  <div class="practice-container">

    <h3 class="section-title">✨ শব্দ অনুশীলন</h3>
    <div class="practice-card">
      <p class="practice-hint">নতুন শব্দ শিখতে নীচের বাটনে চাপ দাও</p>
      <div class="api-key-row">
        <input id="api-key-input" class="api-key-input" type="password"
               placeholder="Gemini API Key (ঐচ্ছিক)..." autocomplete="off" />
        <button class="api-save-btn" onclick="saveKey()">✅ সেট</button>
      </div>
      <div id="key-status"       class="key-status hidden">🔑 Key সেট হয়েছে!</div>
      <button class="generate-btn" onclick="generateWords()">শব্দ তৈরি করো</button>
      <div id="loading-spinner"   class="spinner hidden">⏳ একটু অপেক্ষা করো...</div>
      <div id="error-box"         class="error-box hidden"></div>
      <div id="words-output"      class="words-grid"></div>
    </div>

    <h3 class="section-title" style="margin-top:28px">📖 রিডিং অনুশীলন</h3>
    <div class="practice-card">
      <p class="practice-hint">সহজ অনুচ্ছেদ পড়তে এখানে চাপ দাও</p>
      <button class="reading-btn" onclick="loadReading()">পড়া শুরু করি</button>
      <div id="reading-output" class="reading-output hidden"></div>
    </div>

  </div>
</div>


<script src="/script.js"></script>
</body>
</html>
